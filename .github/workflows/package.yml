name: Package plugin

on:
  push:
    branches:
      - stable-3_4_0

permissions:
  contents: read
  packages: write

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read plugin version
        id: version
        run: |
          RELEASE=$(grep -oP '(?<=<release>)[^<]+' version.xml | head -1)
          APPLICATION=$(grep -oP '(?<=<application>)[^<]+' version.xml | head -1)
          SHORT_SHA="${GITHUB_SHA::7}"
          PACKAGE_TAG="${RELEASE}-build.${GITHUB_RUN_NUMBER}"
          echo "release=${RELEASE}" >> "$GITHUB_OUTPUT"
          echo "application=${APPLICATION}" >> "$GITHUB_OUTPUT"
          echo "package_tag=${PACKAGE_TAG}" >> "$GITHUB_OUTPUT"
          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Build tarball
        run: |
          PLUGIN_DIR="${{ steps.version.outputs.application }}"
          ARCHIVE="${PLUGIN_DIR}-${{ steps.version.outputs.package_tag }}.tar.gz"
          STAGING="dist/${PLUGIN_DIR}"

          mkdir -p "${STAGING}"
          rsync -a \
            --exclude '.git' \
            --exclude '.github' \
            --exclude 'dist' \
            --exclude 'test-server/node_modules' \
            ./ "${STAGING}/"

          mkdir -p dist
          tar -czf "dist/${ARCHIVE}" -C dist "${PLUGIN_DIR}"

          echo "ARCHIVE=${ARCHIVE}" >> "$GITHUB_ENV"
          echo "PLUGIN_DIR=${PLUGIN_DIR}" >> "$GITHUB_ENV"

      - name: Setup ORAS
        uses: oras-project/setup-oras@v1
        with:
          version: 1.2.2

      - name: Publish package to GitHub Packages
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | oras login ghcr.io \
            --username "${{ github.actor }}" \
            --password-stdin

          IMAGE="ghcr.io/${{ github.repository_owner }}/ojsbr-webhook"

          oras push "${IMAGE}:${{ steps.version.outputs.package_tag }}" \
            --artifact-type application/vnd.ojsbr.webhook+tar.gz \
            "dist/${ARCHIVE}:application/vnd.ojsbr.webhook+tar.gz"

          oras push "${IMAGE}:${{ steps.version.outputs.release }}" \
            --artifact-type application/vnd.ojsbr.webhook+tar.gz \
            "dist/${ARCHIVE}:application/vnd.ojsbr.webhook+tar.gz"

          oras push "${IMAGE}:latest" \
            --artifact-type application/vnd.ojsbr.webhook+tar.gz \
            "dist/${ARCHIVE}:application/vnd.ojsbr.webhook+tar.gz"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ojsbr-webhook-${{ steps.version.outputs.package_tag }}
          path: dist/*.tar.gz
          retention-days: 90
