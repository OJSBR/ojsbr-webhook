name: Package plugin

on:
  push:
    branches:
      - stable-3_*_*

permissions:
  contents: write
  packages: write

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read OJS line and plugin metadata
        id: version
        run: |
          BRANCH="${GITHUB_REF_NAME}"
          if [[ ! "$BRANCH" =~ ^stable-([0-9]+)_([0-9]+)_[0-9]+$ ]]; then
            echo "Branch ${BRANCH} is not a supported stable branch." >&2
            exit 1
          fi

          OJS_VERSION="${BASH_REMATCH[1]}.${BASH_REMATCH[2]}"
          APPLICATION=$(grep -oP '(?<=<application>)[^<]+' version.xml | head -1)
          PACKAGE_TAG="${OJS_VERSION}.build.${GITHUB_RUN_NUMBER}"
          PACKAGE_LATEST="${OJS_VERSION}.latest"
          OWNER_LC=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')

          echo "ojs_version=${OJS_VERSION}" >> "$GITHUB_OUTPUT"
          echo "application=${APPLICATION}" >> "$GITHUB_OUTPUT"
          echo "package_tag=${PACKAGE_TAG}" >> "$GITHUB_OUTPUT"
          echo "package_latest=${PACKAGE_LATEST}" >> "$GITHUB_OUTPUT"
          echo "owner_lc=${OWNER_LC}" >> "$GITHUB_OUTPUT"

      - name: Build tarball
        run: |
          PLUGIN_DIR="${{ steps.version.outputs.application }}"
          ARCHIVE="${PLUGIN_DIR}-${{ steps.version.outputs.package_tag }}.tar.gz"
          STAGING="dist/${PLUGIN_DIR}"

          mkdir -p "${STAGING}"
          rsync -a \
            --exclude '.git' \
            --exclude '.github' \
            --exclude 'dist' \
            --exclude 'test-server/node_modules' \
            ./ "${STAGING}/"

          mkdir -p dist
          tar -czf "dist/${ARCHIVE}" -C dist "${PLUGIN_DIR}"

          echo "ARCHIVE=${ARCHIVE}" >> "$GITHUB_ENV"
          echo "PLUGIN_DIR=${PLUGIN_DIR}" >> "$GITHUB_ENV"

      - name: Setup ORAS
        uses: oras-project/setup-oras@v1
        with:
          version: 1.2.2

      - name: Publish package to GitHub Packages
        env:
          IMAGE: ghcr.io/${{ steps.version.outputs.owner_lc }}/ojsbr-webhook
          REPO_URL: https://github.com/${{ github.repository }}
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | oras login ghcr.io \
            --username "${{ github.repository_owner }}" \
            --password-stdin

          for TAG in "${{ steps.version.outputs.package_tag }}" "${{ steps.version.outputs.package_latest }}"; do
            oras push "${IMAGE}:${TAG}" \
              --artifact-type application/vnd.ojsbr.webhook+tar.gz \
              --annotation "org.opencontainers.image.source=${REPO_URL}" \
              --annotation "org.opencontainers.image.version=${TAG}" \
              "dist/${ARCHIVE}:application/vnd.ojsbr.webhook+tar.gz"
          done

      - name: Make package public (admin token)
        if: ${{ secrets.OJSBR_PACKAGES_ADMIN_TOKEN != '' }}
        env:
          GH_TOKEN: ${{ secrets.OJSBR_PACKAGES_ADMIN_TOKEN }}
        run: |
          gh api \
            --method PUT \
            "/orgs/${{ github.repository_owner }}/packages/container/ojsbr-webhook/visibility" \
            -f visibility=public

      - name: Publish public GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.package_tag }}
          name: OJSBR Webhook ${{ steps.version.outputs.package_tag }}
          body: |
            Plugin OJSBR Webhook para OJS ${{ steps.version.outputs.ojs_version }}.

            Instalação:
            ```bash
            tar -xzf ${{ env.ARCHIVE }} -C /caminho/do/ojs/plugins/generic/
            ```
          files: dist/*.tar.gz
          make_latest: true

      - name: Update rolling release tag
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.package_latest }}
          name: OJSBR Webhook ${{ steps.version.outputs.package_latest }}
          body: |
            Última build estável do OJSBR Webhook para OJS ${{ steps.version.outputs.ojs_version }}.
          files: dist/*.tar.gz
          overwrite_files: true

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ojsbr-webhook-${{ steps.version.outputs.package_tag }}
          path: dist/*.tar.gz
          retention-days: 90
